<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
	<style>
		body {
			background: linear-gradient(135deg, #00001a 0%, #000000 100%); /* 深蓝到黑的渐变背景 */
			margin: 0px;
			overflow: hidden;
		}
	</style>
</head>

<body>

	<!-- 引入现代版本的 Three.js -->
	<script type="text/javascript" src="./three.min.js"></script>

	<script type="text/javascript">
		var SEPARATION = 80, AMOUNTX = 60, AMOUNTY = 60;

		var container;
		var camera, scene, renderer;

		var particlesGeometry;
		var positions; 
		var colors;    

		var count = 0;

		// --- 移除鼠标变量，增加自动相机动画变量 ---
		var cameraAngle = 0; // 相机旋转角度

		init();
		animate();

		function init() {

			container = document.createElement('div');
			document.body.appendChild(container);

			camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 10000);
			// 初始位置，后面会被 animate 中的自动逻辑接管
			camera.position.set(0, 400, 1200);  

			scene = new THREE.Scene();

			var numParticles = AMOUNTX * AMOUNTY;

			particlesGeometry = new THREE.BufferGeometry();
			positions = new Float32Array(numParticles * 3); 
			colors = new Float32Array(numParticles * 3);    

			var i = 0;
			for (var ix = 0; ix < AMOUNTX; ix++) {
				for (var iy = 0; iy < AMOUNTY; iy++) {
					positions[i] = ix * SEPARATION - ((AMOUNTX * SEPARATION) / 2); 
					positions[i + 1] = 0; 
					positions[i + 2] = iy * SEPARATION - ((AMOUNTY * SEPARATION) / 2); 
					i += 3;
				}
			}

			particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
			particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

			var circleTexture = generateGlowTexture();

			var material = new THREE.PointsMaterial({
				size: 20, 
				map: circleTexture, 
				blending: THREE.AdditiveBlending, 
				depthTest: false,   
				transparent: true,  
				vertexColors: true,  
				opacity: 0.8        
			});

			var particlesObject = new THREE.Points(particlesGeometry, material);
			scene.add(particlesObject);

			renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); 
			renderer.setPixelRatio(window.devicePixelRatio); 
			renderer.setSize(window.innerWidth, window.innerHeight);
			container.appendChild(renderer.domElement);

			// ====== 移除所有鼠标和触摸事件监听器 ======

			window.addEventListener('resize', onWindowResize, false);

		}

		function generateGlowTexture() {
			var canvas = document.createElement('canvas');
			canvas.width = 64;
			canvas.height = 64;
			var ctx = canvas.getContext('2d');

			var gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
			gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');     
			gradient.addColorStop(0.2, 'rgba(255, 255, 255, 0.8)'); 
			gradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.2)'); 
			gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');     

			ctx.fillStyle = gradient;
			ctx.fillRect(0, 0, 64, 64);

			var texture = new THREE.CanvasTexture(canvas);
			return texture;
		}

		function onWindowResize() {
			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();
			renderer.setSize(window.innerWidth, window.innerHeight);
		}

		function animate() {
			requestAnimationFrame(animate);
			render();
		}

		function render() {

			// ====== 核心修改：全自动相机运镜逻辑 ======
			
			// 1. 让相机在半径 1200 像素的圆周上自动缓缓旋转
			var radius = 1200;
			camera.position.x = Math.sin(cameraAngle) * radius;
			camera.position.z = Math.cos(cameraAngle) * radius;
			
			// 2. 让相机的高度（俯视角度）也随着时间产生轻微的、像呼吸一样的上下起伏（300px ~ 500px 之间）
			camera.position.y = 400 + Math.sin(count * 0.5) * 100;

			// 3. 始终让相机盯着粒子中心稍微偏下方，配合旋转产生绝佳的环绕大片感
			camera.lookAt(new THREE.Vector3(0, -150, 0)); 

			// 控制相机旋转的速度，数值越小旋转越慢、越优雅
			cameraAngle += 0.001; 

			// ==========================================

			var i = 0;
			var positionAttribute = particlesGeometry.getAttribute('position');
			var colorAttribute = particlesGeometry.getAttribute('color');

			var color1 = new THREE.Color(0x00ffff); 
			var color2 = new THREE.Color(0xff00ff); 
			var tempColor = new THREE.Color();

			for (var ix = 0; ix < AMOUNTX; ix++) {
				for (var iy = 0; iy < AMOUNTY; iy++) {

					var y = (Math.sin((ix + count) * 0.2) * 55) + (Math.sin((iy + count) * 0.4) * 55);
					positions[i + 1] = y; 

					var colorRatio = THREE.MathUtils.mapLinear(y, -110, 110, 0, 1);
					tempColor.lerpColors(color1, color2, colorRatio);

					colors[i] = tempColor.r;
					colors[i + 1] = tempColor.g;
					colors[i + 2] = tempColor.b;

					i += 3;
				}
			}

			positionAttribute.needsUpdate = true;
			colorAttribute.needsUpdate = true;

			renderer.render(scene, camera);

			count += 0.03;
		}
	</script>
</body>

</html>
